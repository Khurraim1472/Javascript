<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex">
        <input type="number" class="form-control" id="age" placeholder="Enter your Age">
        <button onclick="checkAge();" class="btn btn-warning">Check Age</button>
    </div>
    <div id="msg">

    </div>
    <div class="d-flex mt-3">
        <input type="password" id="pass" class="form-control " placeholder="Enter password">
        <button onclick="showPass() ;" class="btn btn-primary"><i id="icon" class="bi bi-eye-slash"></i></button>
    </div>
        <button onclick="showData();" class="btn btn-primary mt-4">Show Product</button>

    <div class="container">
        <div class="row" id="prod"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        function checkAge() {
            var age = document.getElementById("age").value;
            var msg = document.getElementById("msg");
            var old = 'You are Old!';
            if (age > 40) {
                msg.innerHTML = `<div class='alert alert-danger'>${old} </div>`
            }

            else {
                msg.innerHTML ="<div class='alert alert-success'> You are young!</div>"
            }
        }

        function showPass() {
            var pass = document.getElementById("pass");
            
            if (pass.type == "password") {
                pass.type = "text";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye-fill");


            }
            else {
                pass.type = "password";
                   icon.classList.remove("bi-eye-fill");
                icon.classList.add("bi-eye-slash");
            }

        }



        function showData() {
            var products = ['Bread','Burger','Pizza','Suschi','Fries','Egg'];
            var row = document.getElementById("prod");
            var proddata=[];

            for(var i=0;i<products.length;i++){
                proddata+=`
            <div class="col-3 ">
                <div class="card"><div class="h1">${products[i]}</div></div>
                </div>`;
            }
            row.innerHTML = proddata;
        
            
            
        }
    </script>
</body>

</html>
